services:
  - type: worker
    name: business-game-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m BUSINESS
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_DB_URI
        sync: false
      - key: OWNER_ID
        sync: false
