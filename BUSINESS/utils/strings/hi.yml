HELP_GAME: |
  **Game Commands** 🎲
  
  /business - Naya game lobby banayein
  /join - Active lobby me join karein
  /start_game - Game shuru karein (Admin only)
  /roll - Dice ghumayein 🎲
  /buy - Property kharidein
  /board - Apni properties aur balance dekhein
  /sell - Bank ko property aadhi keemat par bechein
  /trade - Dusre player ke sath property exchange karein

HELP_PARTY: |
  **Party Game Mode** 🎭
  
  /party - Naya Party Game lobby banayein
  /partyjoin - Party Game me join karein
  /partystart - Game shuru karein
  *(Dice roll Bot ke DM me 1-9 bhejkar hoga!)*

HELP_ADMIN: |
  **Admin Commands** 🛡️
  
  /ban [reply/id] - User ko ban karein
  /unban [reply/id] - User ko unban karein
  /mute [reply/id] - User ko mute karein
  /unmute [reply/id] - User ko unmute karein

HELP_SUDO: |
  **Sudo Commands** ⚙️
  
  /gban [reply/id] - Global ban karein
  /ungban [reply/id] - Global ban hatayein

HELP_TOOLS: |
  **Tools Commands** 🛠️
  
  /ping - Bot ki speed check karein
  /stats - Server usage dekhein

