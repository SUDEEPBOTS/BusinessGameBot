name: Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: bug
assignees: SUDEEPBOTS

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Deployment Environment
      description: Where are you running the bot? (Render, Heroku, VPS)
    validations:
      required: false
